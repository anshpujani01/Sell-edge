<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Curriculum | Secure LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #f8fafc, #eef2ff);
            min-height: 100vh;
        }
        .top-bar {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: #eef2ff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .back-btn:hover { background: #e0e7ff; transform: translateX(-3px); }
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .hero {
            background: linear-gradient(115deg, #1e293b 0%, #0f172a 100%);
            border-radius: 2rem;
            padding: 2rem;
            color: white;
            margin-bottom: 2.5rem;
        }
        .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .lessons-section {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border-left: 5px solid #3b82f6;
            padding-left: 1rem;
        }
        .lesson-item {
            background: white;
            margin: 1rem 0;
            border-radius: 1.2rem;
            overflow: hidden;
        }
        .lesson-btn {
            width: 100%;
            text-align: left;
            padding: 1.2rem 1.5rem;
            background: white;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .lesson-btn:hover {
            background: #f8fafc;
            transform: translateX(6px);
        }
        .lesson-number {
            background: #3b82f6;
            color: white;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            margin-right: 1rem;
        }
        .duration-badge {
            background: #e2e8f0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }
        .access-denied {
            text-align: center;
            background: #fee2e2;
            padding: 3rem;
            border-radius: 2rem;
            color: #b91c1c;
        }
        .loader {
            text-align: center;
            padding: 4rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="top-bar">
    <button class="back-btn" onclick="window.location.href='my-courses.html'"><i class="fas fa-arrow-left"></i> Back to My Courses</button>
    <div><i class="fas fa-lock"></i> Secure Access</div>
</div>
<div class="container" id="mainContainer">
    <div class="loader"><div class="spinner"></div><p>Verifying access...</p></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyBYe05TmBzh1-f3arisvhpSk5fG9xY8_4A",
  authDomain: "velvettrim-6da3a.firebaseapp.com",
  projectId: "velvettrim-6da3a",
    storageBucket: "velvettrim-6da3a.appspot.com",
  messagingSenderId: "357069133185",
  appId: "1:357069133185:web:ed0068ef6454cc43744480",
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    const studentEmailParam = urlParams.get('studentEmail');
    const container = document.getElementById('mainContainer');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function showAccessDenied(reason) {
        container.innerHTML = `
            <div class="access-denied">
                <i class="fas fa-ban" style="font-size:3rem; margin-bottom:1rem;"></i>
                <h2>Access Denied</h2>
                <p>${escapeHtml(reason) || "You have not purchased this course."}</p>
                <button onclick="window.location.href='my-courses.html'" style="margin-top:1rem; background:#3b82f6; border:none; padding:10px 20px; border-radius:40px; color:white; cursor:pointer;">Go to My Courses</button>
            </div>
        `;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        // 1️⃣ Email match check (URL param vs logged-in user)
        if (user.email !== studentEmailParam) {
            showAccessDenied("Email mismatch. Please log in with the correct account.");
            return;
        }

        try {
            // 2️⃣ Verify payment in Firestore
            const paymentsQuery = query(
                collection(db, 'payments'),
                where('studentEmail', '==', user.email.toLowerCase()),
                where('courseId', '==', courseId),
                where('status', '==', 'Completed')
            );
            const paymentSnap = await getDocs(paymentsQuery);
            if (paymentSnap.empty) {
                showAccessDenied("No valid purchase record found for this course.");
                return;
            }

            // 3️⃣ Fetch course document
            const courseRef = doc(db, 'courses', courseId);
            const courseSnap = await getDoc(courseRef);
            if (!courseSnap.exists()) {
                showAccessDenied("Course not found.");
                return;
            }

            const course = courseSnap.data();
            const lessons = Array.isArray(course.content) ? course.content : [];
            const title = escapeHtml(course.title) || 'Untitled Course';
            const description = escapeHtml(course.description) || 'No description available.';

            let lessonsHtml = '';
            if (lessons.length === 0) {
                lessonsHtml = '<div style="text-align:center; padding:2rem;">📘 No lessons yet.</div>';
            } else {
                lessonsHtml = lessons.map(lesson => {
                    const lessonNum = lesson.lessonNumber || '?';
                    const lessonTitle = escapeHtml(lesson.title) || 'Untitled Lesson';
                    const duration = escapeHtml(lesson.duration) || '';
                    return `
                        <div class="lesson-item">
                            <button class="lesson-btn" data-lesson-num="${lessonNum}">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <span class="lesson-number">${lessonNum}</span>
                                    <span class="lesson-title">${lessonTitle}</span>
                                </div>
                                <div style="display:flex; gap:12px; align-items:center;">
                                    ${duration ? `<span class="duration-badge"><i class="far fa-clock"></i> ${duration}</span>` : ''}
                                    <i class="fas fa-play-circle" style="color:#3b82f6; font-size:1.3rem;"></i>
                                </div>
                            </button>
                        </div>
                    `;
                }).join('');
            }

            container.innerHTML = `
                <div class="hero">
                    <h1><i class="fas fa-book-open"></i> ${title}</h1>
                    <p>${description}</p>
                    <div style="margin-top:1rem;"><i class="fas fa-check-circle"></i> Purchased & Verified</div>
                </div>
                <div class="lessons-section">
                    <div class="section-title"><i class="fas fa-list-ul"></i> Curriculum · ${lessons.length} lessons</div>
                    ${lessonsHtml}
                </div>
            `;

            // Attach click handlers to lesson buttons
            document.querySelectorAll('.lesson-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const lessonNumber = btn.dataset.lessonNum;
                    window.location.href = `lesson.html?courseId=${encodeURIComponent(courseId)}&lessonNumber=${lessonNumber}&studentEmail=${encodeURIComponent(studentEmailParam)}`;
                });
            });
        } catch (err) {
            console.error(err);
            showAccessDenied("An error occurred: " + err.message);
        }
    });
</script>
</body>
</html>
