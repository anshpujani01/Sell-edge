<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body{
font-family: Arial;
background:#0f0f0f;
color:white;
padding:20px;
}

.video-container{
max-width:900px;
margin-left: 10px;
margin:auto;
}

iframe{
width:100%;
height:500px;
border-radius:12px;
border:none;
}

.lesson-title{
font-size:22px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="video-container">
<div class="lesson-title" id="lessonTitle">Loading...</div>

<iframe id="lessonVideo" allowfullscreen></iframe>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const courseId = params.get("course");
const lessonIndex = params.get("lesson");

db.collection("courses").doc(courseId).get()
.then(doc=>{
   const lesson = doc.data().content[lessonIndex];

   document.getElementById("lessonTitle").innerText = lesson.title;

   document.getElementById("lessonVideo").src = lesson.fileUrl;
});
</script>

</body>
</html>
